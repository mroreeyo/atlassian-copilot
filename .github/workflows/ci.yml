name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm run test --if-present
      - run: npm run security:scan --if-present
      - run: npm run build --if-present
      - run: npm run smoke:mcp:jira-search --if-present
      - run: npm run smoke:mcp:jira-get-issue --if-present
      - run: npm run smoke:mcp:confluence-search --if-present
      - run: npm run smoke:mcp:confluence-get-page --if-present
      - run: npm run smoke:openai --if-present
